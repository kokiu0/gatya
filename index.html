<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Simple Gacha Game</title>
<style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:sans-serif;
  color:white;
  text-align:center;
}

h1{
  margin-top:30px;
}

button{
  padding:12px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:gold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

#result{
  margin-top:30px;
  font-size:24px;
  min-height:80px;
}

.card{
  display:inline-block;
  padding:15px;
  margin:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(5px);
  animation:fadeIn 0.5s ease;
}

.star3{ border:2px solid #aaa; }
.star4{ border:2px solid #4fc3f7; }
.star5{ border:2px solid gold; box-shadow:0 0 15px gold; }

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.loading{
  font-size:22px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>
<body>

<h1>✨ Gacha Game ✨</h1>

<button onclick="singleGacha()">単発ガチャ</button>
<button onclick="tenGacha()">10連ガチャ</button>

<div id="result"></div>

<script>
const characters = [
  {name:"スライム", rarity:3},
  {name:"剣士", rarity:3},
  {name:"魔法使い", rarity:4},
  {name:"ドラゴンナイト", rarity:4},
  {name:"神龍", rarity:5}
];

function getRandom(){
  const rand = Math.random()*100;
  if(rand < 60) return 3;       // 60%
  if(rand < 90) return 4;       // 30%
  return 5;                     // 10%
}

function draw(){
  const rarity = getRandom();
  const pool = characters.filter(c => c.rarity === rarity);
  const char = pool[Math.floor(Math.random()*pool.length)];
  return char;
}

function singleGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>ガチャ中...</div>";
  setTimeout(()=>{
    const char = draw();
    resultDiv.innerHTML = createCard(char);
  },1000);
}

function tenGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>10連ガチャ中...</div>";
  setTimeout(()=>{
    let output = "";
    for(let i=0;i<10;i++){
      const char = draw();
      output += createCard(char);
    }
    resultDiv.innerHTML = output;
  },1500);
}

function createCard(char){
  return `
    <div class="card star${char.rarity}">
      <div>★${char.rarity}</div>
      <div>${char.name}</div>
    </div>
  `;
}
</script>

</body>
</html>
