<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gacha Game</title>
<style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:sans-serif;
  color:white;
  text-align:center;
}

h1{ margin-top:30px; }

button{
  padding:12px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:gold;
  transition:0.3s;
}

button:hover{ transform:scale(1.1); }

#result{
  margin-top:30px;
  font-size:22px;
  min-height:80px;
}

.card{
  display:inline-block;
  padding:15px;
  margin:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(5px);
  animation:fadeIn 0.5s ease;
}

.star2{ border:2px solid #aaa; }
.star3{ border:2px solid #4fc3f7; }
.star4{ border:2px solid gold; box-shadow:0 0 15px gold; }

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.loading{
  font-size:22px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>
<body>

<h1>✨ Gacha Game ✨</h1>

<button onclick="singleGacha()">単発ガチャ</button>
<button onclick="tenGacha()">10連ガチャ</button>

<div id="result"></div>

<script>
// ⭐2（21種類）
const star2 = [
"a","b","c","d","e","f","g","h","i","j",
"k","l","m","n","o","p","q","r","s","t","u"
];

// ⭐3（21種類）
const star3 = [
"a'","b'","c'","d'","e'","f'","g'","h'","i'","j'",
"k'","l'","m'","n'","o'","p'","q'","r'","s'","t'","u'"
];

// ⭐4（45種類）
const star4 = Array.from({length:45}, (_,i)=>"SSR_"+(i+1));

function getRarity(){
  const rand = Math.random()*100;
  if(rand < 67) return 2;      // 67%
  if(rand < 97) return 3;      // 30%
  return 4;                    // 3%
}

function draw(){
  const rarity = getRarity();
  let pool;
  if(rarity === 2) pool = star2;
  if(rarity === 3) pool = star3;
  if(rarity === 4) pool = star4;

  const name = pool[Math.floor(Math.random()*pool.length)];
  return {rarity,name};
}

function singleGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>ガチャ中...</div>";
  setTimeout(()=>{
    const char = draw();
    resultDiv.innerHTML = createCard(char);
  },1000);
}

function tenGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>10連ガチャ中...</div>";
  setTimeout(()=>{
    let output = "";
    for(let i=0;i<10;i++){
      output += createCard(draw());
    }
    resultDiv.innerHTML = output;
  },1500);
}

function createCard(char){
  return `
    <div class="card star${char.rarity}">
      <div>★${char.rarity}</div>
      <div>${char.name}</div>
    </div>
  `;
}
</script>

</body>
</html>
