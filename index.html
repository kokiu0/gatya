<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gacha Game</title>
<style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

h1{ margin-top:30px; }

button{
  padding:12px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:gold;
  transition:0.3s;
}

button:hover{ transform:scale(1.1); }

#result{
  margin-top:30px;
  font-size:22px;
  min-height:80px;
}

.card{
  display:inline-block;
  padding:20px;
  margin:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(5px);
  animation:fadeIn 0.5s ease;
  font-size:24px;
}

.star2{ border:2px solid #aaa; }
.star3{ border:2px solid #4fc3f7; }
.star4{ border:2px solid gold; box-shadow:0 0 15px gold; }
.star5{
  border:3px solid hotpink;
  box-shadow:0 0 40px magenta;
  animation:rainbow 1s infinite linear;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes rainbow{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

.loading{
  font-size:22px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* ⭐5ムービー演出 */
#legendEffect{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:50px;
  font-weight:bold;
  color:gold;
  opacity:0;
  pointer-events:none;
  z-index:999;
}

#legendEffect.active{
  animation:legendShow 2.5s forwards;
}

@keyframes legendShow{
  0%{opacity:0;}
  20%{opacity:1; background:black;}
  50%{background:radial-gradient(circle, white, magenta, black);}
  80%{opacity:1;}
  100%{opacity:0;}
}

</style>
</head>
<body>

<h1>✨ Gacha Game ✨</h1>

<button onclick="singleGacha()">単発ガチャ</button>
<button onclick="tenGacha()">10連ガチャ</button>

<div id="result"></div>

<div id="legendEffect">
  🌈 LEGEND RARE 🌈
</div>

<script>

// ⭐2
const star2 = [
"a","b","c","d","e","f","g","h","i","j",
"k","l","m","n","o","p","q","r","s","t","u"
];

// ⭐3
const star3 = [
"a'","b'","c'","d'","e'","f'","g'","h'","i'","j'",
"k'","l'","m'","n'","o'","p'","q'","r'","s'","t'","u'"
];

// ⭐4
const star4 = Array.from({length:45}, (_,i)=>"SSR_"+(i+1));

// ⭐5（単発限定）
const star5 = ["LIMITED_X","LIMITED_Y","LIMITED_Z","LIMITED_Ω","LIMITED_Λ"];

function getRarity(isSingle){
  const rand = Math.random()*100;

  if(isSingle){
    if(rand < 66) return 2;
    if(rand < 96) return 3;
    if(rand < 99) return 4;
    return 5; // 1%
  }else{
    if(rand < 67) return 2;
    if(rand < 97) return 3;
    return 4;
  }
}

function draw(isSingle){
  const rarity = getRarity(isSingle);
  let pool;

  if(rarity === 2) pool = star2;
  if(rarity === 3) pool = star3;
  if(rarity === 4) pool = star4;
  if(rarity === 5) pool = star5;

  const name = pool[Math.floor(Math.random()*pool.length)];
  return {rarity,name};
}

function singleGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>ガチャ中...</div>";

  setTimeout(()=>{
    const char = draw(true);

    if(char.rarity === 5){
      playLegendEffect(char);
    }else{
      resultDiv.innerHTML = createCard(char);
    }
  },1200);
}

function tenGacha(){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "<div class='loading'>10連ガチャ中...</div>";

  setTimeout(()=>{
    let output = "";
    for(let i=0;i<10;i++){
      output += createCard(draw(false));
    }
    resultDiv.innerHTML = output;
  },1500);
}

function playLegendEffect(char){
  const effect = document.getElementById("legendEffect");
  const resultDiv = document.getElementById("result");

  effect.classList.add("active");

  setTimeout(()=>{
    effect.classList.remove("active");
    resultDiv.innerHTML = createCard(char);
  },2500);
}

function createCard(char){
  return `
    <div class="card star${char.rarity}">
      <div>★${char.rarity}</div>
      <div>${char.name}</div>
    </div>
  `;
}

</script>

</body>
</html>
